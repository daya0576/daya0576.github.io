<div class="color-scheme" aria-label="Color scheme">
  Color scheme:
  <button type="button" data-theme="auto">auto</button>,
  <button type="button" data-theme="light">light</button>,
  <button type="button" data-theme="dark">dark</button>.
</div>
<script>
(function () {
  var key = 'theme';
  var root = document.querySelector('.color-scheme');
  var body = document.body;
  var modes = { auto: true, light: true, dark: true };

  if (!root) return;

  function normalize(theme) {
    return modes[theme] ? theme : 'auto';
  }

  function apply(theme) {
    theme = normalize(theme);
    body.setAttribute('a', theme);
    localStorage.setItem(key, theme);

    root.querySelectorAll('button[data-theme]').forEach(function (button) {
      var active = button.dataset.theme === theme;
      button.classList.toggle('active', active);
      button.setAttribute('aria-current', active ? 'true' : 'false');
    });
  }

  apply(localStorage.getItem(key) || body.getAttribute('a') || 'auto');

  root.addEventListener('click', function (event) {
    var button = event.target.closest('button[data-theme]');
    if (!button) return;
    apply(button.dataset.theme);
    button.blur();
  });
})();
</script>
