{{- /*
  Rain Sound

  Plays rain ambience in a seamless loop, controlled by custom events.

  - Preloads audio on page load (async, non-blocking)
  - Uses howler.js with html5:false to force Web Audio API (AudioBufferSourceNode.loop)
    for gapless looping (<audio loop> has inherent gaps between iterations)
  - OGG Opus format: no encoder delay/padding (unlike AAC/MP3), ensuring seamless loops
  - 1s fade in/out on play/stop
  - Listens for 'rain-activate' / 'rain-deactivate' window events
*/ -}}

<script src="/js/howler.min.js"></script>
<script>
(function () {
  var FADE = 1000;
  var sound = new Howl({
    src: ['/rain.ogg', '/rain_origin.m4a'],
    loop: true,
    preload: true,
    html5: false,
    volume: 0
  });

  var playing = false;

  function play() {
    if (playing) return;
    playing = true;
    if (!sound.playing()) {
      sound.play();
    }
    sound.fade(0, 1, FADE);
  }

  function stop() {
    if (!playing) return;
    playing = false;
    sound.fade(sound.volume(), 0, FADE);
    sound.once('fade', function () {
      if (!playing) sound.pause();
    });
  }

  window.addEventListener('rain-activate', play);
  window.addEventListener('rain-deactivate', stop);
})();
</script>
