{{- /*
  Rain sound – requirements:
  1. 页面加载时异步预加载音频文件（fetch + decode 延迟到首次交互）
  2. 使用 Web Audio API AudioBuffer 实现无缝循环（<audio loop> 有间隙）
  3. 播放/停止带 1s 淡入淡出
  4. 监听 rain-activate / rain-deactivate 自定义事件
*/ -}}

<script>
(function () {
  var FADE = 1;
  var playing = false;
  var ctx, gain, source;
  var buffer = null;
  var rawData = null;
  var pendingPlay = false;

  /* Fetch raw audio data immediately on page load */
  fetch('/rain_origin.m4a')
    .then(function (r) { return r.arrayBuffer(); })
    .then(function (ab) { rawData = ab; decodeIfReady(); })
    .catch(function () {});

  function getCtx() {
    if (ctx) return ctx;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    gain = ctx.createGain();
    gain.gain.value = 0;
    gain.connect(ctx.destination);
    return ctx;
  }

  function decodeIfReady() {
    if (!rawData || !ctx) return;
    var data = rawData;
    rawData = null;
    ctx.decodeAudioData(data).then(function (decoded) {
      buffer = decoded;
      if (pendingPlay) { pendingPlay = false; play(); }
    }).catch(function () {});
  }

  function ramp(v) {
    gain.gain.cancelScheduledValues(ctx.currentTime);
    gain.gain.setValueAtTime(gain.gain.value, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(v, ctx.currentTime + FADE);
  }

  function play() {
    if (playing) return;
    var c = getCtx();
    if (c.state === 'suspended') c.resume();

    /* If raw data fetched but not yet decoded, decode now */
    if (!buffer && rawData) {
      pendingPlay = true;
      decodeIfReady();
      return;
    }
    if (!buffer) { pendingPlay = true; return; }

    playing = true;
    gain.gain.setValueAtTime(0, c.currentTime);
    source = c.createBufferSource();
    source.buffer = buffer;
    source.loop = true;
    source.connect(gain);
    source.start(0);
    ramp(1);
  }

  function stop() {
    if (!playing) { pendingPlay = false; return; }
    playing = false;
    ramp(0);
    var s = source;
    setTimeout(function () { if (!playing && s) try { s.stop(); } catch (e) {} }, FADE * 1000);
    source = null;
  }

  window.addEventListener('rain-activate', play);
  window.addEventListener('rain-deactivate', stop);
})();
</script>
