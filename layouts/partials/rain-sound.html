{{- /* Rain sound: triggered by rain-activate / rain-deactivate events */ -}}
<audio id="rain-audio" loop preload="metadata">
  <source src="/rain-long.m4a" type="audio/mp4">
</audio>

<script>
(function () {
  var audio = document.getElementById('rain-audio');
  var FADE = 1;
  var playing = false;
  var ctx, gain;

  function initAudio() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    gain = ctx.createGain();
    gain.gain.value = 0;
    ctx.createMediaElementSource(audio).connect(gain);
    gain.connect(ctx.destination);
  }

  function fadeTo(v) {
    gain.gain.cancelScheduledValues(ctx.currentTime);
    gain.gain.setValueAtTime(gain.gain.value, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(v, ctx.currentTime + FADE);
  }

  function play() {
    if (playing) return;
    initAudio();
    if (ctx.state === 'suspended') ctx.resume();
    playing = true;
    audio.play().then(function () { fadeTo(1); }).catch(function () { playing = false; });
  }

  function stop() {
    if (!playing) return;
    playing = false;
    if (!gain) { audio.pause(); return; }
    fadeTo(0);
    setTimeout(function () { if (!playing) audio.pause(); }, FADE * 1000);
  }

  window.addEventListener('rain-activate', play);
  window.addEventListener('rain-deactivate', stop);
})();
</script>
