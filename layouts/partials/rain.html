{{- /* Anime-style rain effect – click to toggle between shimmer & falling rain */ -}}
<canvas id="rain-canvas" style="position:absolute;top:0;left:0;width:100%;height:33.4vh;pointer-events:auto;z-index:9999;filter:blur(0.5px);cursor:pointer;"></canvas>
<script>
(function(){
  function getDropCount(){ return window.innerWidth < 768 ? 40 : 120; }
  const WIND_ANGLE    = 0.15;
  const MIN_LEN       = 16;
  const MAX_LEN       = 42;
  const LINE_WIDTH    = 1.6;
  const FADE_START    = 0.3;
  const SHIMMER_MIN   = 0.08;
  const SHIMMER_MAX   = 0.48;
  const SHIMMER_SPEED_MIN = 0.4;
  const SHIMMER_SPEED_MAX = 1.8;

  /* falling rain tunables */
  const FALL_SPEED_MIN = 400;   // slowest drops
  const FALL_SPEED_MAX = 1400;  // fastest drops
  const SPAWN_RATE     = 0.4;   // new drops per px width per sec

  function isDark(){
    const a = document.body.getAttribute('a');
    if(a === 'dark') return true;
    if(a === 'light') return false;
    return window.matchMedia('(prefers-color-scheme: dark)').matches;
  }
  function dropColor(){ return isDark() ? 'rgba(180,210,240,' : 'rgba(80,100,130,'; }

  const canvas = document.getElementById('rain-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');

  let W, H, dpr;
  const cosA = Math.cos(WIND_ANGLE), sinA = Math.sin(WIND_ANGLE);

  /* state: 'idle' = shimmering, 'raining' = drops falling continuously */
  let state = 'idle';
  let lastTs = 0;

  function makeDrop(yOverride){
    const len = MIN_LEN + Math.random() * (MAX_LEN - MIN_LEN);
    const x   = Math.random() * (W + 60) - 30;
    const y   = yOverride !== undefined ? yOverride : Math.random() * H * 1.1;
    const d = {
      x1: x, y1: y,
      len: len,
      width: 0.6 + Math.random() * (LINE_WIDTH - 0.6),
      phase: Math.random() * Math.PI * 2,
      speed: SHIMMER_SPEED_MIN + Math.random() * (SHIMMER_SPEED_MAX - SHIMMER_SPEED_MIN),
      baseAlpha: SHIMMER_MIN + Math.random() * (SHIMMER_MAX - SHIMMER_MIN),
      posFade: 1.0,
      fallSpeed: FALL_SPEED_MIN + Math.random() * (FALL_SPEED_MAX - FALL_SPEED_MIN)
    };
    const fadeY = Math.max(d.y1, 0) / H;
    d.posFade = fadeY < FADE_START ? 1.0
              : Math.max(0, 1.0 - (fadeY - FADE_START) / (1.0 - FADE_START));
    return d;
  }

  function makeDrops(){
    const arr = [];
    const count = getDropCount();
    for(let i = 0; i < count; i++) arr.push(makeDrop());
    return arr;
  }

  let drops = [];

  function resize(){
    dpr = window.devicePixelRatio || 1;
    W = canvas.clientWidth;
    H = canvas.clientHeight;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    drops = makeDrops();
  }
  window.addEventListener('resize', resize);
  resize();

  /* click to toggle */
  canvas.addEventListener('click', function(){
    if(state === 'idle'){
      state = 'raining';
      window.dispatchEvent(new CustomEvent('rain-activate'));
    } else {
      state = 'idle';
      drops = makeDrops(); // reset to static positions
      window.dispatchEvent(new CustomEvent('rain-deactivate'));
    }
  });

  function drawDrop(d, sec){
    const x1 = d.x1, y1 = d.y1;
    const x2 = x1 - sinA * d.len, y2 = y1 - cosA * d.len;

    const fadeY = Math.max(y1, 0) / H;
    const pf = fadeY < FADE_START ? 1.0
             : Math.max(0, 1.0 - (fadeY - FADE_START) / (1.0 - FADE_START));
    if(pf <= 0.01) return;

    const shimmer = 0.5 + 0.5 * Math.sin(sec * d.speed + d.phase);
    const alpha = (SHIMMER_MIN + shimmer * (d.baseAlpha - SHIMMER_MIN)) * pf;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = dropColor() + alpha.toFixed(3) + ')';
    ctx.lineWidth = d.width;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  function frame(ts){
    const sec = ts / 1000;
    const dt = lastTs ? (ts - lastTs) / 1000 : 0.016;
    lastTs = ts;
    ctx.clearRect(0, 0, W, H);

    if(state === 'raining'){
      /* move drops down */
      /* move drops along wind angle (same direction as streak slant) */
      for(let i = drops.length - 1; i >= 0; i--){
        const d = drops[i];
        const dist = d.fallSpeed * dt;
        d.y1 += cosA * dist;
        d.x1 += sinA * dist;
        if(d.y1 > H + 60){
          drops.splice(i, 1);
          continue;
        }
        drawDrop(d, sec);
      }
      /* spawn new drops at top */
      const toSpawn = SPAWN_RATE * W * dt;
      const count = Math.floor(toSpawn) + (Math.random() < (toSpawn % 1) ? 1 : 0);
      for(let i = 0; i < count; i++){
        drops.push(makeDrop(-MAX_LEN - Math.random() * 30));
      }
    } else {
      /* idle shimmer */
      for(let i = 0; i < drops.length; i++){
        drawDrop(drops[i], sec);
      }
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
