{{- /* Anime-style rain effect – click to toggle between shimmer & falling rain (about page only) */ -}}
<canvas id="rain-canvas" style="position:absolute;top:0;left:0;width:100%;height:33.4vh;pointer-events:none;z-index:-1;filter:blur(0.5px);"></canvas>
<button id="rain-toggle" class="rain-toggle" aria-label="Toggle rain">⏸</button>
<script>
(function(){
  const isAbout = document.body.dataset.rainInteractive === 'true';

  function getDropCount(){ return window.innerWidth < 768 ? 40 : 120; }
  const WIND_ANGLE    = 0.15;
  const MIN_LEN       = 16;
  const MAX_LEN       = 42;
  const LINE_WIDTH    = 1.6;
  const FADE_START    = 0.3;
  const SHIMMER_MIN   = 0.08;
  const SHIMMER_MAX   = 0.48;
  const SHIMMER_SPEED_MIN = 0.4;
  const SHIMMER_SPEED_MAX = 1.8;

  /* falling rain tunables */
  const FALL_SPEED_MIN = 400;   // slowest drops
  const FALL_SPEED_MAX = 1400;  // fastest drops
  const SPAWN_RATE     = 0.4;   // new drops per px width per sec

  function isDark(){
    const a = document.body.getAttribute('a');
    if(a === 'dark') return true;
    if(a === 'light') return false;
    return window.matchMedia('(prefers-color-scheme: dark)').matches;
  }
  function dropColor(){ return isDark() ? 'rgba(180,210,240,' : 'rgba(80,100,130,'; }

  const canvas = document.getElementById('rain-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');

  let W, H, dpr;
  const cosA = Math.cos(WIND_ANGLE), sinA = Math.sin(WIND_ANGLE);

  /* state: 'idle' = shimmering, 'raining' = drops falling continuously */
  let state = 'idle';
  let lastTs = 0;

  /* toggle button – only shown on about page */
  const toggleBtn = document.getElementById('rain-toggle');
  if(!isAbout) toggleBtn.style.display = 'none';

  function showBtn(playing){
    toggleBtn.innerHTML = playing
      ? '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="1" width="4" height="14"/><rect x="10" y="1" width="4" height="14"/></svg>'
      : '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><polygon points="3,1 14,8 3,15"/></svg>';
    toggleBtn.classList.add('visible');
  }

  function startRain(){
    state = 'raining';
    window.dispatchEvent(new CustomEvent('rain-activate'));
    showBtn(true);
  }
  function stopRain(){
    state = 'idle';
    drops = makeDrops();
    window.dispatchEvent(new CustomEvent('rain-deactivate'));
    showBtn(false);
  }

  function makeDrop(yOverride){
    const len = MIN_LEN + Math.random() * (MAX_LEN - MIN_LEN);
    const x   = Math.random() * (W + 60) - 30;
    const y   = yOverride !== undefined ? yOverride : Math.random() * H * 1.1;
    const d = {
      x1: x, y1: y,
      len: len,
      width: 0.6 + Math.random() * (LINE_WIDTH - 0.6),
      phase: Math.random() * Math.PI * 2,
      speed: SHIMMER_SPEED_MIN + Math.random() * (SHIMMER_SPEED_MAX - SHIMMER_SPEED_MIN),
      baseAlpha: SHIMMER_MIN + Math.random() * (SHIMMER_MAX - SHIMMER_MIN),
      posFade: 1.0,
      fallSpeed: FALL_SPEED_MIN + Math.random() * (FALL_SPEED_MAX - FALL_SPEED_MIN)
    };
    const fadeY = Math.max(d.y1, 0) / H;
    d.posFade = fadeY < FADE_START ? 1.0
              : Math.max(0, 1.0 - (fadeY - FADE_START) / (1.0 - FADE_START));
    return d;
  }

  function makeDrops(){
    const arr = [];
    const count = getDropCount();
    for(let i = 0; i < count; i++) arr.push(makeDrop());
    return arr;
  }

  let drops = [];
  let paused = false;

  function resize(){
    dpr = window.devicePixelRatio || 1;
    W = canvas.clientWidth;
    H = canvas.clientHeight;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    drops = makeDrops();
  }
  window.addEventListener('resize', resize);
  resize();

  /* click interaction – about page only */
  if(isAbout){
    function inRainZone(e){
      var r = canvas.getBoundingClientRect();
      return e.clientY >= r.top && e.clientY <= r.top + r.height * 2 / 3 && e.clientX >= r.left && e.clientX <= r.right;
    }
    function isInteractive(e){ return !!e.target.closest('a,button,input,label,select,textarea,[role="button"]'); }

    document.addEventListener('mousemove', function(e){
      document.body.style.cursor = (inRainZone(e) && !isInteractive(e)) ? 'pointer' : '';
    });

    document.addEventListener('click', function(e){
      if(!inRainZone(e) || isInteractive(e)) return;
      if(state === 'idle') startRain(); else stopRain();
    });

    toggleBtn.addEventListener('click', function(e){
      e.stopPropagation();
      if(state === 'raining') stopRain(); else startRain();
    });
  }

  function drawDrop(d, sec){
    const x1 = d.x1, y1 = d.y1;
    const x2 = x1 - sinA * d.len, y2 = y1 - cosA * d.len;

    const fadeY = Math.max(y1, 0) / H;
    const pf = fadeY < FADE_START ? 1.0
             : Math.max(0, 1.0 - (fadeY - FADE_START) / (1.0 - FADE_START));
    if(pf <= 0.01) return;

    const shimmer = 0.5 + 0.5 * Math.sin(sec * d.speed + d.phase);
    const alpha = (SHIMMER_MIN + shimmer * (d.baseAlpha - SHIMMER_MIN)) * pf;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = dropColor() + alpha.toFixed(3) + ')';
    ctx.lineWidth = d.width;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  document.addEventListener('visibilitychange', function(){
    if(document.hidden){
      paused = true;
    } else {
      paused = false;
      lastTs = 0;
      requestAnimationFrame(frame);
    }
  });

  function frame(ts){
    if(paused) return;
    const sec = ts / 1000;
    const dt = lastTs ? Math.min((ts - lastTs) / 1000, 0.1) : 0.016;
    lastTs = ts;
    ctx.clearRect(0, 0, W, H);

    if(state === 'raining'){
      for(let i = drops.length - 1; i >= 0; i--){
        const d = drops[i];
        const dist = d.fallSpeed * dt;
        d.y1 += cosA * dist;
        d.x1 += sinA * dist;
        if(d.y1 > H + 60){
          drops.splice(i, 1);
          continue;
        }
        drawDrop(d, sec);
      }
      /* spawn new drops at top */
      const toSpawn = SPAWN_RATE * W * dt;
      const count = Math.floor(toSpawn) + (Math.random() < (toSpawn % 1) ? 1 : 0);
      for(let i = 0; i < count; i++){
        drops.push(makeDrop(-MAX_LEN - Math.random() * 30));
      }
    } else {
      /* idle shimmer */
      for(let i = 0; i < drops.length; i++){
        drawDrop(drops[i], sec);
      }
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
